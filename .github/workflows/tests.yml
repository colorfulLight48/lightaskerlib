name: Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests (macOS)
        run: swift test --parallel

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3"
      - name: Run tests (Linux)
        run: swift test --parallel

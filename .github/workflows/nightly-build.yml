name: Build and Release on Push

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift (Linux)
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Build
        run: swift build -c release --static-swift-stdlib

      - name: Prepare Artifact Name
        run: |
          # Dynamically get the build folder
          BIN_PATH=$(swift build -c release --show-bin-path)
          echo "Looking for library in $BIN_PATH"
          
          # Copy the library to the root with a unique name
          cp "$BIN_PATH/liblightaskerlib.a" "liblightaskerlib-${{ runner.os }}.a"

      - name: Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: liblightaskerlib-${{ runner.os }}.a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

